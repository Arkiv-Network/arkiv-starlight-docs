services:
  docs-stage:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./stage:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - arkiv_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs-stage.rule=Host(`stage.docs.arkiv.network`)"
      - "traefik.http.routers.docs-stage.entrypoints=websecure"
      - "traefik.http.routers.docs-stage.tls.certresolver=letsencrypt"
      - "traefik.http.services.docs-stage.loadbalancer.server.port=80"

  docs-prod:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./prod:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - arkiv_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs-prod.rule=Host(`docs.arkiv.network`)"
      - "traefik.http.routers.docs-prod.entrypoints=websecure"
      - "traefik.http.routers.docs-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.docs-prod.loadbalancer.server.port=80"

networks:
  arkiv_network:
    external: true
